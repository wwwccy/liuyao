<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>六爻排盘</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  /* 水墨纸卷调色板 */
  --bg:#f0ebe0;           /* 暖米色页面背景 */
  --bg2:#e8e2d4;          /* 卡片内嵌背景 */
  --bg3:#dfd8c8;          /* 深一级嵌套 */
  --bg-card:#faf7f0;      /* 卡片主色 */
  --ink:#2a2010;          /* 主文字色 */
  --gold:#7a6020;         /* 金棕主色 */
  --gold-l:#a88028;       /* 悬停加深 */
  --gold-dim:rgba(122,96,32,.12);
  --muted:#7a7060;        /* 次要文字 */
  --muted2:#a09880;       /* 更淡文字 */
  --red:#802020;
  --blue:#284470;
  --border:rgba(120,96,32,.22);
  --border2:rgba(120,96,32,.1);
  --shadow:rgba(60,44,10,.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--ink);font-family:'Noto Serif SC',serif;min-height:100vh;}
.wrap{max-width:820px;margin:0 auto;padding:48px 24px 100px;}

/* ── 标题 ── */
header{text-align:center;margin-bottom:40px;padding-bottom:24px;border-bottom:1px solid var(--border);}
.title{font-size:2.2rem;font-weight:300;letter-spacing:.65em;color:var(--ink);margin-right:-.65em;}
.subtitle{font-size:.8rem;letter-spacing:.28em;color:var(--muted2);margin-top:8px;}
.hr-gold{width:160px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:14px auto 0;}

/* ── 标签 ── */
.sec-label{font-size:.74rem;letter-spacing:.26em;color:var(--gold);margin-bottom:11px;display:block;}

/* ── 卡片 ── */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:22px;margin-bottom:20px;box-shadow:0 2px 8px var(--shadow);}

/* ── 时间输入 ── */
.time-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.time-row input[type=datetime-local]{
  background:var(--bg2);border:1px solid var(--border);color:var(--ink);
  font-family:'Noto Serif SC',serif;font-size:.96rem;padding:8px 12px;
  border-radius:3px;outline:none;flex:1;min-width:200px;}
.time-row input:focus{border-color:var(--gold);}
.btn-sm{background:transparent;border:1px solid var(--border);color:var(--muted);
  font-family:'Noto Serif SC',serif;font-size:.8rem;padding:8px 14px;border-radius:3px;
  cursor:pointer;letter-spacing:.1em;white-space:nowrap;transition:all .2s;}
.btn-sm:hover{border-color:var(--gold);color:var(--gold);}
.sizhi-show{font-size:.9rem;color:var(--muted);letter-spacing:.06em;margin-top:10px;line-height:2.4;}
.sizhi-show b{color:var(--ink);}

/* ── 模式切换 ── */
.tabs{display:flex;border:1px solid var(--border);border-radius:3px;overflow:hidden;margin-bottom:16px;}
.tab{flex:1;padding:9px;text-align:center;font-family:'Noto Serif SC',serif;font-size:.88rem;
  letter-spacing:.16em;color:var(--muted);background:transparent;border:none;cursor:pointer;transition:all .2s;}
.tab.on{background:var(--ink);color:#fff;}
.tab:not(:last-child){border-right:1px solid var(--border);}

/* ── 摇钱法 ── */
#coinSec{display:none;}#coinSec.show{display:block;}
#manSec.hide{display:none;}
.shake-ind{font-size:.88rem;color:var(--muted);letter-spacing:.14em;text-align:center;margin-bottom:12px;}
.coins-row{display:flex;justify-content:center;gap:22px;margin:14px 0 20px;}
.coin{width:64px;height:64px;border-radius:50%;
  background:radial-gradient(circle at 38% 32%,#f0d860,#b89018);
  border:1.5px solid #a07818;
  box-shadow:0 2px 8px rgba(140,100,12,.22);
  display:flex;align-items:center;justify-content:center;
  font-size:.76rem;color:rgba(60,36,0,.7);font-family:'Noto Serif SC',serif;}
.coin.shaking{animation:cb .1s ease-in-out infinite alternate;}
@keyframes cb{from{transform:translateY(0) rotate(-5deg);}to{transform:translateY(-8px) rotate(5deg);}}
.shake-results{display:flex;flex-direction:column-reverse;gap:5px;margin-top:12px;}
.shake-row{display:grid;grid-template-columns:56px 1fr 90px;align-items:center;gap:10px;
  padding:8px 12px;background:var(--bg2);border:1px solid var(--border2);border-radius:3px;font-size:.92rem;}
.shake-row .sl{font-size:.8rem;color:var(--gold);letter-spacing:.12em;}
.shake-row .st{text-align:right;font-size:.86rem;}
.s-yang .st{color:var(--gold);}
.s-yin  .st{color:var(--blue);}
.s-yangc .st{color:var(--red);font-weight:600;}
.s-yinc  .st{color:var(--blue);font-weight:600;}

/* ── 手动输入 ── */
.yao-grid{display:flex;flex-direction:column;gap:8px;}
.yao-row{display:grid;grid-template-columns:52px 1fr 26px;align-items:center;gap:10px;
  padding:8px 12px;background:var(--bg2);border:1px solid var(--border2);border-radius:3px;}
.yao-label{font-size:.82rem;color:var(--gold);letter-spacing:.16em;}
.type-btns{display:flex;gap:5px;flex-wrap:wrap;}
.type-btn{padding:4px 9px;border-radius:3px;border:1px solid var(--border);background:transparent;
  color:var(--muted);font-family:'Noto Serif SC',serif;font-size:.82rem;cursor:pointer;transition:all .15s;}
.type-btn.a-yang {background:var(--gold-dim);border-color:var(--gold);color:var(--gold);}
.type-btn.a-yin  {background:rgba(40,68,112,.07);border-color:var(--blue);color:var(--blue);}
.type-btn.a-yangc{background:rgba(128,32,32,.07);border-color:var(--red);color:var(--red);font-weight:600;}
.type-btn.a-yinc {background:rgba(40,68,112,.1);border-color:var(--blue);color:#3a5898;font-weight:600;}
.yao-prev{font-size:.88rem;color:var(--muted);text-align:center;}

/* ── 按钮 ── */
.btn-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;}
.btn-primary{background:var(--ink);color:#f5f0e8;border:none;border-radius:3px;padding:11px 30px;
  font-family:'Noto Serif SC',serif;font-size:.9rem;letter-spacing:.26em;cursor:pointer;transition:background .2s;}
.btn-primary:hover{background:var(--gold);}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);
  border-radius:3px;padding:10px 20px;font-family:'Noto Serif SC',serif;font-size:.86rem;
  letter-spacing:.14em;cursor:pointer;transition:all .2s;}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}

/* ── 结果区 ── */
.hidden{display:none;}
#result{animation:up .4s ease;}
@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

/* ── 四值卡片 ── */
.meta-grid{display:flex;flex-wrap:wrap;gap:8px;}
.meta-item{background:var(--bg2);border:1px solid var(--border2);border-radius:3px;padding:9px 14px;min-width:90px;}
.meta-k{font-size:.72rem;letter-spacing:.18em;color:var(--muted2);margin-bottom:3px;}
.meta-v{font-size:1rem;color:var(--ink);}

/* ── 卦名标题 ── */
.gua-hd{display:flex;align-items:baseline;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.gua-name{font-size:1.35rem;font-weight:400;color:var(--ink);letter-spacing:.14em;}
.gua-num{font-size:.76rem;color:var(--muted2);letter-spacing:.1em;}
.gua-arr{color:var(--muted2);font-size:1rem;margin:0 4px;}

/* ── 排盘表格 ── */
.paipan{width:100%;border-collapse:collapse;table-layout:auto;}
.paipan th{
  font-size:.72rem;letter-spacing:.18em;color:var(--gold);
  border-bottom:1px solid var(--border);
  padding:7px 8px;text-align:center;font-weight:400;white-space:nowrap;}
.paipan td{
  padding:10px 8px;border-bottom:1px solid var(--border2);
  vertical-align:middle;text-align:center;font-size:.96rem;}
.paipan tr:last-child td{border-bottom:none;}
.paipan tr.dong td{background:rgba(128,32,32,.04);}
.paipan tr:hover td{background:rgba(122,96,32,.03);}

.col-pos{font-size:.84rem;color:var(--muted);letter-spacing:.04em;white-space:nowrap;}
.col-ls{font-size:.88rem;color:#3a5888;letter-spacing:.03em;white-space:nowrap;}
.col-lqnj{font-size:.9rem;letter-spacing:.04em;white-space:nowrap;line-height:1.6;}
.lq{}
.nj-dz{font-weight:600;}
/* 五行颜色保持不变 */
.wx-木{color:#2d6e20;}.wx-火{color:#c03020;}.wx-土{color:#8a6020;}.wx-金{color:#b8920a;}.wx-水{color:#1a5588;}

/* ── 爻象线条 ── */
.yao-cell{padding:8px 12px !important;}
.yao-sym{display:inline-flex;flex-direction:column;align-items:center;gap:3px;vertical-align:middle;}
.yao-sym .ln{height:4px;border-radius:1px;background:var(--ink);}
.yao-sym .ln.yang{width:50px;}
.yao-sym .ln.yin-l,.yao-sym .ln.yin-r{width:20px;}
.yao-sym.ch .ln{background:var(--red);}
.dong-tag{font-size:.68rem;color:var(--red);margin-left:3px;vertical-align:middle;}

/* ── 世应标记 ── */
.shi-ying{display:inline-block;font-size:.78rem;letter-spacing:.04em;margin-left:4px;vertical-align:middle;}
.sm{color:var(--gold);font-weight:600;}
.ym{color:var(--blue);font-weight:600;}

/* ── 变卦分隔 ── */
.mid-div{border-left:1px solid var(--border) !important;}

/* ── 卦辞 ── */
.guaci-block{padding:4px 0;}
.guaci-ttl{font-size:.76rem;letter-spacing:.2em;color:var(--gold);margin-bottom:8px;}
.guaci-orig{font-size:.98rem;line-height:2.1;color:var(--ink);letter-spacing:.05em;}
.guaci-bh{font-size:.9rem;line-height:2;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--border2);}
.yaoci-item{padding:12px 0;border-bottom:1px solid var(--border2);}
.yaoci-item:last-child{border-bottom:none;}
.yaoci-pos{font-size:.74rem;letter-spacing:.16em;color:var(--red);margin-bottom:5px;}
.yaoci-orig{font-size:.98rem;line-height:2.1;color:var(--ink);}
.yaoci-bh{font-size:.9rem;line-height:2;color:var(--muted);margin-top:5px;}

/* ── 语言切换 ── */
.lang-switch{position:fixed;top:16px;right:20px;z-index:100;display:flex;
  border:1px solid var(--border);border-radius:3px;overflow:hidden;background:var(--bg-card);
  box-shadow:0 1px 4px var(--shadow);}
.lang-btn{padding:6px 12px;font-family:'Noto Serif SC',serif;font-size:.8rem;letter-spacing:.08em;
  color:var(--muted);background:transparent;border:none;cursor:pointer;transition:all .2s;}
.lang-btn.on{background:var(--ink);color:#f5f0e8;}
.lang-btn:not(:last-child){border-right:1px solid var(--border);}

/* ── 英文版表格适配 ── */
body.en .paipan{table-layout:fixed;font-size:.78rem;}
body.en .paipan th{font-size:.64rem;letter-spacing:.06em;padding:6px 5px;}
body.en .paipan td{font-size:.78rem;padding:8px 5px;}
body.en .col-pos{font-size:.74rem;white-space:normal;line-height:1.4;max-width:70px;}
body.en .col-ls{font-size:.74rem;white-space:normal;line-height:1.4;max-width:80px;}
body.en .col-lqnj{font-size:.76rem;white-space:normal;line-height:1.5;max-width:130px;}
body.en .nj-dz{font-size:.76rem;}
body.en .yao-cell{padding:6px 8px !important;max-width:60px;}
body.en .yao-sym .ln.yang{width:38px;}
body.en .yao-sym .ln.yin-l,body.en .yao-sym .ln.yin-r{width:15px;}
body.en .gua-name{font-size:1rem;}
body.en .meta-v{font-size:.82rem;line-height:1.5;}
body.en .sizhi-show{font-size:.76rem;line-height:2;}
body.en .sizhi-show b{font-size:.82rem;}
body.en .meta-item{min-width:unset;flex:1 1 140px;}
body.en .meta-k{font-size:.64rem;}
body.en .gua-hd{gap:8px;}
body.en .gua-num{font-size:.64rem;}
body.en .shake-row{grid-template-columns:48px 1fr 110px;font-size:.78rem;}
body.en .shake-row .sl{font-size:.68rem;}
body.en .type-btn{font-size:.72rem;padding:3px 7px;}
body.en .yao-label{font-size:.74rem;}

/* Guaci */
.guaci-block{padding:4px 0;}
.guaci-ttl{font-size:.6rem;letter-spacing:.2em;color:var(--gold);margin-bottom:7px;}
.guaci-orig{font-size:.82rem;line-height:2;color:var(--ink);letter-spacing:.05em;}
.guaci-bh{font-size:.75rem;line-height:1.9;color:var(--muted);margin-top:6px;padding-top:6px;border-top:1px solid var(--border2);}
.yaoci-item{padding:10px 0;border-bottom:1px solid var(--border2);}
.yaoci-item:last-child{border-bottom:none;}
.yaoci-pos{font-size:.6rem;letter-spacing:.16em;color:var(--red);margin-bottom:4px;}
.yaoci-orig{font-size:.82rem;line-height:2;color:var(--ink);}
.yaoci-bh{font-size:.75rem;line-height:1.9;color:var(--muted);margin-top:4px;}
</style>
</head>
<body>
<div class="lang-switch">
  <button class="lang-btn on" id="btnZh" onclick="setLang('zh')">中文</button>
  <button class="lang-btn"    id="btnEn" onclick="setLang('en')">EN</button>
</div>
<div class="wrap">
<header>
  <div class="title">六爻排盘</div>
  <div class="subtitle">纳甲 · 六亲 · 六神 · 空亡 · 卦身</div>
  <div class="hr-gold"></div>
</header>

<div class="card">
  <span class="sec-label">起卦时间</span>
  <div class="time-row">
    <input type="datetime-local" id="timeInput">
    <button class="btn-sm" id="nowBtnEl" onclick="setNow()">当前时间</button>
  </div>
  <div class="sizhi-show" id="sizhiShow"></div>
</div>

<div class="card">
  <span class="sec-label">起卦方式</span>
  <div class="tabs">
    <button class="tab on" id="tabC" onclick="switchMode('coin')">摇钱法</button>
    <button class="tab"    id="tabM" onclick="switchMode('man')">手动输入</button>
  </div>

  <div id="coinSec" class="show">
    <div class="shake-ind" id="shakeInd">准备摇第一爻</div>
    <div class="coins-row">
      <div class="coin" id="c0">正</div>
      <div class="coin" id="c1">正</div>
      <div class="coin" id="c2">正</div>
    </div>
    <div style="text-align:center;">
      <button class="btn-primary" id="shakeBtn" onclick="doShake()">摇　卦</button>
    </div>
    <div class="shake-results" id="shakeRes"></div>
    <div class="btn-row" id="shakeCastRow" style="display:none;justify-content:center;margin-top:10px;">
      <button class="btn-primary" id="showResultBtn" onclick="castFromShake()">显示排盘</button>
    </div>
  </div>

  <div id="manSec" class="hide">
    <div class="yao-grid" id="yaoGrid"></div>
    <div class="btn-row">
      <button class="btn-primary" id="castManualBtn" onclick="castManual()">排　盘</button>
      <button class="btn-outline" id="resetManualBtn" onclick="resetAll()">重　置</button>
    </div>
  </div>
</div>

<div id="result" class="hidden">
  <div class="card" id="metaCard"></div>
  <div class="card" id="paipanCard"></div>
  <div class="card" id="guaciCard"></div>
</div>

<div style="text-align:center;margin-top:6px;">
  <button class="btn-outline" id="recastBtn" onclick="resetAll()">重新起卦</button>
</div>
</div>

<script>
// =====================================================
// 基础常量
// =====================================================
const TG=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const DZ=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const YAOPOS=['初','二','三','四','五','上'];

// 天干英文翻译
const TG_EN={
  甲:'Jia (Yang Wood)',乙:'Yi (Yin Wood)',丙:'Bing (Yang Fire)',丁:'Ding (Yin Fire)',
  戊:'Wu (Yang Earth)',己:'Ji (Yin Earth)',庚:'Geng (Yang Metal)',辛:'Xin (Yin Metal)',
  壬:'Ren (Yang Water)',癸:'Gui (Yin Water)'
};
// 地支英文翻译
const DZ_EN={
  子:'Zi (Rat)',丑:'Chou (Ox)',寅:'Yin (Tiger)',卯:'Mao (Rabbit)',
  辰:'Chen (Dragon)',巳:'Si (Snake)',午:'Wu (Horse)',未:'Wei (Goat)',
  申:'Shen (Monkey)',酉:'You (Rooster)',戌:'Xu (Dog)',亥:'Hai (Pig)'
};

// 地支五行
const DZ_WX={子:'水',丑:'土',寅:'木',卯:'木',辰:'土',巳:'火',午:'火',未:'土',申:'金',酉:'金',戌:'土',亥:'水'};
const TG_WX={甲:'木',乙:'木',丙:'火',丁:'火',戊:'土',己:'土',庚:'金',辛:'金',壬:'水',癸:'水'};
const GONG_WX={乾:'金',兑:'金',离:'火',震:'木',巽:'木',坎:'水',艮:'土',坤:'土'};
const LIUHE={子:'丑',丑:'子',寅:'亥',亥:'寅',卯:'戌',戌:'卯',辰:'酉',酉:'辰',巳:'申',申:'巳',午:'未',未:'午'};
const LIUSHEN=['青龙','朱雀','勾陈','螣蛇','白虎','玄武'];
const LIUSHEN_START={甲:0,乙:0,丙:1,丁:1,戊:2,己:3,庚:4,辛:4,壬:5,癸:5};

// 爻名：初九/初六, 九二/六二 ... 上九/上六
function yaoName(pos, yang){
  if(LANG==='en'){
    return `Line ${pos} (${yang?'yang':'yin'})`;
  }
  const yn=yang?'九':'六';
  if(pos===1) return '初'+yn;
  if(pos===6) return '上'+yn;
  return yn+YAOPOS[pos-1];
}

// =====================================================
// 八卦
// =====================================================
const BAGUA=[
  {name:'乾',tri:[1,1,1]},  // 初阳二阳三阳
  {name:'兑',tri:[1,1,0]},  // 初阳二阳三阴
  {name:'离',tri:[1,0,1]},  // 初阳二阴三阳
  {name:'震',tri:[1,0,0]},  // 初阳二阴三阴
  {name:'巽',tri:[0,1,1]},  // 初阴二阳三阳
  {name:'坎',tri:[0,1,0]},  // 初阴二阳三阴
  {name:'艮',tri:[0,0,1]},  // 初阴二阴三阳
  {name:'坤',tri:[0,0,0]},  // 初阴二阴三阴
];
function triIdx(t){return BAGUA.findIndex(b=>b.tri[0]===t[0]&&b.tri[1]===t[1]&&b.tri[2]===t[2]);}

// =====================================================
// 六十四卦
// =====================================================
const GUA64=[
  // 乾宫（金）
  {name:'乾为天',ename:'The Creative',   l:0,u:0,shi:6,ying:3,num:1,  gong:'乾'},
  {name:'天风姤',ename:'Coming to Meet',   l:4,u:0,shi:1,ying:4,num:44, gong:'乾'},
  {name:'天山遁',ename:'Retreat',   l:6,u:0,shi:2,ying:5,num:33, gong:'乾'},
  {name:'天地否',ename:'Standstill',   l:7,u:0,shi:3,ying:6,num:12, gong:'乾'},
  {name:'风地观',ename:'Contemplation',   l:7,u:4,shi:4,ying:1,num:20, gong:'乾'},
  {name:'山地剥',ename:'Splitting Apart',   l:7,u:6,shi:5,ying:2,num:23, gong:'乾'},
  {name:'火地晋',ename:'Progress',   l:7,u:2,shi:4,ying:1,num:35, gong:'乾'},
  {name:'火天大有',ename:'Great Possession', l:0,u:2,shi:3,ying:6,num:14, gong:'乾'},
  // 坎宫（水）
  {name:'坎为水',ename:'The Abysmal',   l:5,u:5,shi:6,ying:3,num:29, gong:'坎'},
  {name:'水泽节',ename:'Limitation',   l:1,u:5,shi:1,ying:4,num:60, gong:'坎'},
  {name:'水雷屯',ename:'Difficulty at the Beginning',   l:3,u:5,shi:2,ying:5,num:3,  gong:'坎'},
  {name:'水火既济',ename:'After Completion', l:2,u:5,shi:3,ying:6,num:63, gong:'坎'},
  {name:'泽火革',ename:'Revolution',   l:2,u:1,shi:4,ying:1,num:49, gong:'坎'},
  {name:'雷火丰',ename:'Abundance',   l:2,u:3,shi:5,ying:2,num:55, gong:'坎'},
  {name:'地火明夷',ename:'Darkening of the Light', l:2,u:7,shi:4,ying:1,num:36, gong:'坎'},
  {name:'地水师',ename:'The Army',   l:5,u:7,shi:3,ying:6,num:7,  gong:'坎'},

// =====================================================
// 干支历 — 直接解析输入字符串，不经过时区转换
// =====================================================
// 基准：1984-01-01=甲午(30)，验证2026-04-19=癸亥 ✓
const BASE_Y=1984,BASE_M=1,BASE_D=1,BASE_IDX=30;

function dateDiff(y,m,d){
  // 计算(y,m,d)到(1984,1,1)的天数差，纯整数运算
  function jdn(yy,mm,dd){
    const a=Math.floor((14-mm)/12);
    const Y=yy+4800-a, M=mm+12*a-3;
    return dd+Math.floor((153*M+2)/5)+365*Y+Math.floor(Y/4)-Math.floor(Y/100)+Math.floor(Y/400)-32045;
  }
  return jdn(y,m,d)-jdn(BASE_Y,BASE_M,BASE_D);
}

function getDayGZ(y,m,d){
  const diff=dateDiff(y,m,d);
  const idx=((BASE_IDX+diff)%60+60)%60;
  return TG[idx%10]+DZ[idx%12];
}

function getYearGZIdx(y,m,d){
  let yr=y;
  // 立春约2/4
  if(m<2||(m===2&&d<4)) yr--;
  return ((yr-1984)%60+60)%60;
}
function getYearGZ(y,m,d){const i=getYearGZIdx(y,m,d);return TG[i%10]+DZ[i%12];}

const JIEQI=[
  {m:1,d:6,dz:'丑'},{m:2,d:4,dz:'寅'},{m:3,d:6,dz:'卯'},
  {m:4,d:5,dz:'辰'},{m:5,d:6,dz:'巳'},{m:6,d:6,dz:'午'},
  {m:7,d:7,dz:'未'},{m:8,d:7,dz:'申'},{m:9,d:8,dz:'酉'},
  {m:10,d:8,dz:'戌'},{m:11,d:7,dz:'亥'},{m:12,d:7,dz:'子'},
];
function getMonthDZ(m,d){
  let cur='丑';
  for(let i=JIEQI.length-1;i>=0;i--){
    const jq=JIEQI[i];
    if(m>jq.m||(m===jq.m&&d>=jq.d)){cur=jq.dz;break;}
  }
  if(m===1&&d<JIEQI[0].d) cur='子';
  return cur;
}
function getMonthGZ(y,m,d){
  const yearTGIdx=getYearGZIdx(y,m,d)%10;
  const monthDZ=getMonthDZ(m,d);
  const mdzI=DZ.indexOf(monthDZ);
  const bases=[2,4,6,8,0,2,4,6,8,0];
  const seq=(mdzI-2+12)%12;
  return TG[(bases[yearTGIdx]+seq)%10]+monthDZ;
}
function getHourDZ(h){
  const hh=h===23?-1:h;
  return DZ[Math.floor((hh+1)/2)%12];
}
function getHourGZ(y,m,d,h){
  const dayIdx=((BASE_IDX+dateDiff(y,m,d))%60+60)%60;
  const dayTGI=dayIdx%10;
  const hourDZ=getHourDZ(h);
  const hdzI=DZ.indexOf(hourDZ);
  const bases=[0,2,4,6,8,0,2,4,6,8];
  return TG[(bases[dayTGI]+hdzI)%10]+hourDZ;
}

// 解析datetime-local字符串 -> {y,m,d,h,min}
function parseInput(){
  const v=document.getElementById('timeInput').value;
  if(!v){const n=new Date();return{y:n.getFullYear(),m:n.getMonth()+1,d:n.getDate(),h:n.getHours(),min:n.getMinutes()};}
  // format: "2026-04-19T10:30"
  const [date,time]=v.split('T');
  const [y,mo,day]=date.split('-').map(Number);
  const [h,min]=(time||'00:00').split(':').map(Number);
  return{y,m:mo,d:day,h,min};
}

function getSiZhi(){
  const {y,m,d,h}=parseInput();
  return{
    year:  getYearGZ(y,m,d),
    month: getMonthGZ(y,m,d),
    day:   getDayGZ(y,m,d),
    hour:  getHourGZ(y,m,d,h),
  };
}

}

// =====================================================
let selTypes=[null,null,null,null,null,null];
let shakeTypes=[],shakeStep=0;

function doShake(){
  if(shakeStep>=6) return;
  const coins=[rnd(),rnd(),rnd()];
  const sum=coins.reduce((a,b)=>a+b,0);
  let type,cls,label;
  const L2=I18N[LANG];
  if(sum===6){type='6';cls='s-yinc';label=L2.oldYin;}
  else if(sum===9){type='9';cls='s-yangc';label=L2.oldYang;}
  else if(sum===7){type='7';cls='s-yang';label=L2.shaoYang;}
  else{type='8';cls='s-yin';label=L2.shaoYin;}

  [0,1,2].forEach(i=>{
    const el=document.getElementById('c'+i);
    el.classList.add('shaking');
    setTimeout(()=>{el.classList.remove('shaking');el.textContent=coins[i]===3?'正':'反';},350);
  });

  setTimeout(()=>{
    shakeTypes[shakeStep]=type;
    const res=document.getElementById('shakeRes');
    const row=document.createElement('div');
    row.className='shake-row '+cls;
    // 爻象
    const yang=(type==='7'||type==='9');
    row.innerHTML=`<span class="sl">${tr('shaking',shakeStep)}</span><span>${makeYaoHTML(yang,isDong(type))}</span><span class="st">${label}</span>`;
    res.appendChild(row);
    shakeStep++;
    if(shakeStep<6){
      document.getElementById('shakeInd').textContent=tr('prepLine',shakeStep);
    } else {
      document.getElementById('shakeInd').textContent=I18N[LANG].shakeDone;
      document.getElementById('shakeBtn').disabled=true;
      document.getElementById('shakeCastRow').style.display='flex';
    }
  },400);
}
function rnd(){return Math.random()<.5?3:2;}
function castFromShake(){selTypes=[...shakeTypes];doCast();}

    const bianLQNJ=`<span class="lq wx-${bianWx}">${tlq(bianLQ[i])}</span><span class="nj-dz wx-${bianWx}">${bdzDisp}${bianWxDisp}</span>`;

    const benSymHTML=makeYaoHTML(yang,dong)+syTag(yang,isShi,isYing);
    const bianSymHTML=makeYaoHTML(byang,false)+syTag(byang,bIsShi,bIsYing);

    let row=`<tr class="${dong?'dong':''}">
      <td class="col-pos">${posName}</td>
      <td class="col-ls">${tls(liushen[i])}</td>
      <td class="col-lqnj" style="text-align:left;padding-left:10px;">${benLQNJ}</td>
      <td class="yao-cell">${benSymHTML}</td>`;
    if(hasDong){
      row+=`<td class="yao-cell mid-div">${bianSymHTML}</td>
      <td class="col-lqnj" style="text-align:left;padding-left:8px;">${bianLQNJ}</td>`;
    }
    row+=`</tr>`;
    tbody+=row;
  }
  tbody+='</tbody>';

  card.innerHTML=ghdHTML+`<table class="paipan">${thead}${tbody}</table>`;
}

function renderGuaci(benGua,bianGua,hasDong,benYao){
  const el=document.getElementById('guaciCard');
  const L=I18N[LANG];
  const gc=GUACI[benGua.name];
  const gcLang=gc?gc[LANG]:null;

  if(!gcLang){
    el.innerHTML=`<span class="sec-label">${L.secGuaci}</span><div style="color:var(--muted);font-size:.73rem;">${L.guaciMissing(benGua.name)}</div>`;
    return;
  }

  const dongList=selTypes.map((v,i)=>({v,i})).filter(x=>isDong(x.v));
  let html=`<div class="guaci-block">
    <span class="sec-label">${L.secGuaci}</span>
    <div class="guaci-ttl">${benGua.name}${LANG==='en'&&benGua.ename?' — '+benGua.ename:''}</div>
    <div class="guaci-orig">${gcLang.guaci}</div>
    <div class="guaci-bh">${gcLang.baihua}</div>
  </div>`;

  if(dongList.length>0){
    html+=`<div style="margin-top:14px;"><span class="sec-label">${L.secDongYao}</span>`;
    dongList.forEach(({i})=>{
      const yang=benYao[i]===1;
      const yc=gcLang.yaoci[i];
      if(yc) html+=`<div class="yaoci-item">
        <div class="yaoci-pos">${yaoName(i+1,yang)}</div>
        <div class="yaoci-orig">${yc.t}</div>
        <div class="yaoci-bh">${yc.b}</div>
      </div>`;
    });
    html+=`</div>`;
  }

  if(hasDong){
    const bgc=GUACI[bianGua.name];
    const bgcLang=bgc?bgc[LANG]:null;
    html+=`<div style="margin-top:14px;"><span class="sec-label">${L.secBian}</span>
    <div style="font-size:.85rem;color:var(--ink);letter-spacing:.1em;padding:6px 0;">${bianGua.name}${LANG==='en'&&bianGua.ename?' — '+bianGua.ename:''} (${LANG==='zh'?'第'+bianGua.num+'卦':'Hex. '+bianGua.num})</div>
    ${bgcLang?`<div class="guaci-bh">${bgcLang.guaci}</div>`:''}
    </div>`;
  }
  el.innerHTML=html;
}



function doCast(){
  const sz=getSiZhi();
  const kong=getKong(sz.day);
  // dayWX removed - 六亲现在用卦宫五行

  const benYao=selTypes.map(v=>yaoVal(v));
  benYao_g=benYao; // save for guaci
  const bianYao=selTypes.map((v,i)=>isDong(v)?1-benYao[i]:benYao[i]);
  const hasDong=selTypes.some(v=>isDong(v));

  const benL=triIdx([benYao[0],benYao[1],benYao[2]]);
  const benU=triIdx([benYao[3],benYao[4],benYao[5]]);
  const benGua=findGua(benL,benU);

  const bianL=triIdx([bianYao[0],bianYao[1],bianYao[2]]);
  const bianU=triIdx([bianYao[3],bianYao[4],bianYao[5]]);
  const bianGua=findGua(bianL,bianU);

  // 直接从GUA_DATA取纳甲和六亲
  const benData=getGuaData(benGua);
  const bianData=getGuaData(bianGua);

  const benNJ=benData.dz;
  const bianNJ=bianData.dz;

  const benGongWx = GONG_WX[benGua.gong];
  const bianGongWx = GONG_WX[bianGua.gong];

  function getSixQin(gongWx, yaoWx){
    const sheng={木:'火',火:'土',土:'金',金:'水',水:'木'};
    const ke={木:'土',土:'水',水:'火',火:'金',金:'木'};

    if(gongWx===yaoWx) return '兄弟';
    if(sheng[yaoWx]===gongWx) return '父母';
    if(sheng[gongWx]===yaoWx) return '子孙';
    if(ke[yaoWx]===gongWx) return '官鬼';
    if(ke[gongWx]===yaoWx) return '妻财';
    return '?';
  }

  const benLQ = benNJ.map(dz => getSixQin(benGongWx, DZ_WX[dz]));
  const bianLQ = bianNJ.map(dz => getSixQin(benGongWx, DZ_WX[dz]));  // 变卦六亲用本卦宫五行

  const lsStart=LIUSHEN_START[sz.day[0]]||0;
  const liushen=Array.from({length:6},(_,i)=>LIUSHEN[(lsStart+i)%6]);

  // 卦身：阳世从子起，阴世从午起，从初爻顺数到世爻位置
  function getGuaShen(shiPos, shiYang) {
    const dzAll=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
    const startIdx = shiYang ? 0 : 6; // 阳起子，阴起午
    return dzAll[(startIdx + shiPos - 1) % 12];
  }

  const guaShen = getGuaShen(benGua.shi, benYao[benGua.shi-1]===1);
  const bianGuaShen = getGuaShen(bianGua.shi, bianYao[bianGua.shi-1]===1);

  renderMeta(sz,kong,guaShen,bianGuaShen);
  renderPaipan(benGua,bianGua,hasDong,benYao,bianYao,benNJ,bianNJ,benLQ,bianLQ,liushen,benGua.shi,benGua.ying,kong);
  renderGuaci(benGua,bianGua,hasDong,benYao);

  document.getElementById('result').classList.remove('hidden');
  setTimeout(()=>document.getElementById('result').scrollIntoView({behavior:'smooth'}),50);
}
